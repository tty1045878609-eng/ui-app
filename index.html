    :root {
      --phone-w: 402px;
      --bg: #f4f7fb;
      --yellow: #fff000;
      --ink: #101010;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background: #dfe5ec;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button {
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    img {
      display: block;
      max-width: 100%;
      user-select: none;
      -webkit-user-drag: none;
    }

    .phone {
      position: relative;
      width: min(100vw, var(--phone-w));
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      box-shadow: 0 18px 60px rgba(19, 28, 45, .20);
    }

    .screen {
      display: none;
      width: 100%;
      min-height: 100vh;
      padding-bottom: 78px;
      transform-origin: center;
    }

    .screen.active { display: block; }

    .screen.entering {
      display: block;
      animation: pageIn .38s cubic-bezier(.22, .72, .16, 1) both;
    }

    .screen.exiting {
      position: absolute;
      inset: 0;
      z-index: 35;
      display: block;
      pointer-events: none;
      animation: pageOut .30s cubic-bezier(.4, 0, .2, 1) both;
    }

    .screen.entering.reverse {
      animation-name: pageInReverse;
    }

    .screen.exiting.reverse {
      animation-name: pageOutReverse;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateX(28px) scale(.985);
        filter: blur(2px);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes pageOut {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateX(-22px) scale(.99);
        filter: blur(2px);
      }
    }

    @keyframes pageInReverse {
      from {
        opacity: 0;
        transform: translateX(-28px) scale(.985);
        filter: blur(2px);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes pageOutReverse {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateX(22px) scale(.99);
        filter: blur(2px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .screen.entering,
      .screen.exiting {
        animation: none;
      }
    }

    .tabbar {
      position: fixed;
      z-index: 50;
      left: 50%;
      bottom: 0;
      width: min(100vw, var(--phone-w));
      height: 74px;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 0;
      background: #fff;
      box-shadow: none;
    }

    .tab {
      position: relative;
      overflow: hidden;
      border: 0;
      background: transparent;
      color: #a6a8ad;
      display: grid;
      grid-template-rows: 29px 17px;
      place-items: end center;
      padding: 7px 0 5px;
      font-size: 11px;
      font-weight: 700;
      transition: color .18s ease, transform .16s ease;
    }

    .tab i {
      font-style: normal;
      font-size: 22px;
      line-height: 1;
    }

    .tab img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      opacity: .36;
      filter: grayscale(1);
      transform-origin: center bottom;
      transition: opacity .18s ease, transform .18s ease, filter .18s ease;
    }

    .tab span {
      position: relative;
      z-index: 1;
      line-height: 17px;
      transition: transform .18s ease;
    }

    .tab::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 8px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 240, 0, .34);
      opacity: 0;
      transform: translateX(-50%) scale(.45);
      transition: opacity .22s ease, transform .22s ease;
    }

    .tab:active,
    .tab.is-pressing {
      transform: translateY(1px);
    }

    .tab:active img,
    .tab.is-pressing img {
      transform: scale(.88);
    }

    .tab.is-pressing::before {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .tab.active {
      color: #000 !important;
      font-weight: 900;
    }

    .tab.active img {
      opacity: 1 !important;
      filter: brightness(0) grayscale(1) contrast(1.2) !important;
      transform: scale(1.08);
    }

    .tab.active span {
      color: #000 !important;
    }

      color: #161616;
      display: grid;
      place-items: center;
      font-size: 11px;
    }

    .coin {

      height: 24px;

      border-radius: 50%;
      background: #ffd457;
      display: grid;
      place-items: center;
      font-size: 12px;

      height: 39px;
      margin: 19px auto 12px;

      justify-content: space-between;
      align-items: center;
      margin: 0 22px;
      color: #b5b9c2;
      font-size: 11px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 22px;
      height: 13px;
      margin-left: 4px;
      border-radius: 9px;
      background: #ff8e00;
      vertical-align: middle;
    }

    .switch::after {
      content: "";
      position: absolute;
      right: 2px;
      top: 2px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fff;
    }

    .tasks {

    <button class="hotspot" style="left: 318px; top: 633px; width: 35px; height: 30px;" data-toast="签到提醒已开启">reminder</button>
  </div>

  <script>
    const screens = document.querySelectorAll(".screen");
    const tabs = document.querySelectorAll(".tab");
    const toast = document.getElementById("toast");
    const modal = document.getElementById("modal");
    const screenOrder = ["home", "community", "petcare", "messages", "profile", "trade", "shop", "ai", "signin", "mypets", "addpet", "completepet", "productDetail"];
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let toastTimer;
    let transitionTimer;
    let lastProductScreen = "home";

    function showToast(text) {
      clearTimeout(toastTimer);
      toast.textContent = text;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function playMotionVideos() {
      document.querySelectorAll(".motion-card-video").forEach(video => {
        video.muted = true;
        video.loop = true;
        video.play().catch(() => {});
      });
    }

    function switchScreen(id) {
      const current = document.querySelector(".screen.active");
      const next = document.getElementById(id);
      if (!next || current === next) {
        modal.classList.toggle("show", id === "signin");
        return;
      }

      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.screen === id));
      modal.classList.toggle("show", id === "signin");
      clearTimeout(transitionTimer);
      screens.forEach(screen => screen.classList.remove("entering", "exiting", "reverse"));

      if (prefersReducedMotion || !current) {
        screens.forEach(screen => screen.classList.toggle("active", screen.id === id));
        window.scrollTo({ top: 0, behavior: "auto" });
        return;
      }

      const currentIndex = screenOrder.indexOf(current.id);
      const nextIndex = screenOrder.indexOf(id);
      const isReverse = nextIndex !== -1 && currentIndex !== -1 && nextIndex < currentIndex;

      next.classList.add("active", "entering");
      current.classList.add("exiting");
      if (isReverse) {
        next.classList.add("reverse");
        current.classList.add("reverse");
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
      transitionTimer = setTimeout(() => {
        current.classList.remove("active", "exiting", "reverse");
        next.classList.remove("entering", "reverse");
        playMotionVideos();
      }, 390);
    }

    function playTabFeedback(tab) {
      tab.classList.remove("is-pressing");
      void tab.offsetWidth;
      tab.classList.add("is-pressing");
      setTimeout(() => tab.classList.remove("is-pressing"), 230);
    }

    function openProductDetail(source) {
      const activeScreen = document.querySelector(".screen.active");
      lastProductScreen = activeScreen?.id || "home";
      document.getElementById("detailImage").src = source.dataset.image || "assets/cutouts/ec1308a024adccd766e4af83617c5f1f 1.png";
      document.getElementById("detailTitle").textContent = source.dataset.title || "宠物精选商品";
      document.getElementById("detailPrice").textContent = source.dataset.price || "24";
      document.getElementById("detailSpec").textContent = source.dataset.spec || "默认规格 x1";
      switchScreen("productDetail");
    }

    document.addEventListener("click", event => {
      const productBackButton = event.target.closest("[data-product-back]");
      if (productBackButton) {
        switchScreen(lastProductScreen);
        return;
      }

      const screenButton = event.target.closest("[data-screen]");
      if (screenButton) {
        if (screenButton.classList.contains("tab")) playTabFeedback(screenButton);
        switchScreen(screenButton.dataset.screen);
        return;
      }

      const openSigninModalButton = event.target.closest("[data-open-signin-modal]");
      if (openSigninModalButton) {
        modal.classList.add("show");
        return;
      }

      const closeSigninModalButton = event.target.closest("[data-close-signin-modal]");
      if (closeSigninModalButton) {
        modal.classList.remove("show");
        showToast("签到成功，积分 +10");
        return;
      }

      const addButton = event.target.closest("[data-add]");
      if (addButton) {
        addButton.textContent = "✓";
        showToast("已加入购物车");
        setTimeout(() => addButton.textContent = "+", 900);
        return;
      }

      const productDetailButton = event.target.closest("[data-product-detail]");
      if (productDetailButton) {
        openProductDetail(productDetailButton);
        return;
      }

      const toastButton = event.target.closest("[data-toast]");
      if (toastButton) showToast(toastButton.dataset.toast);
    });

    playMotionVideos();
  </script>
